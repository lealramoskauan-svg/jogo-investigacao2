<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
border:4px solid rgba(255,255,255,0.15);
background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* CAMERA */
.front-camera{
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
width:10px;
height:10px;
background:#1c1c1c;
border-radius:50%;
border:2px solid #444;
z-index:15;
}

/* STATUS */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
z-index:5;
}

.right-icons{
display:flex;
align-items:center;
gap:6px;
}

.battery{
transform:rotate(90deg);
font-size:16px;
color:white;
}

/* INTRO */
#intro{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
text-align:center;
}

.sigil{
width:60px;
height:60px;
border:2px solid #4aa3ff;
transform:rotate(45deg);
position:relative;
}

.sigil::before,.sigil::after{
content:"";
position:absolute;
background:#4aa3ff;
}

.sigil::before{width:2px;height:60px;left:50%;top:0;transform:translateX(-50%);}
.sigil::after{height:2px;width:60px;top:50%;left:0;transform:translateY(-50%);}

/* BOOT */
#boot{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:100;
}

.bar{
width:220px;
height:12px;
border:2px solid #000;
background:#111;
border-radius:6px;
overflow:hidden;
margin-top:15px;
}

.bar-fill{
height:100%;
width:0%;
background:red;
animation:load 2s linear forwards;
}

@keyframes load{
100%{width:100%;}
}

/* LOCK */
.lock{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:4;
}

#dots{
font-size:24px;
letter-spacing:8px;
margin:20px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.keypad button{
height:60px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:18px;
cursor:pointer;
}

/* HOME (CORRIGIDO) */
#home{
display:none;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:20px;
margin-top:80px;
font-size:30px;
text-align:center;
width:100%;
}

/* BLOCK */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:20;
}

.block-card{
position:relative;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:20px;
width:80%;
text-align:center;
}

/* X */
.close-x{
position:absolute;
top:10px;
right:10px;
width:26px;
height:26px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
background:rgba(255, 204, 0, 0.15);
color:#ffcc00;
font-weight:700;
}

.close-x:hover{
transform:scale(1.1);
background:rgba(255, 204, 0, 0.25);
}

/* DOCK */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
z-index:10;
}

.homebar{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="phone">

<!-- INTRO -->
<div id="intro">
<div class="sigil"></div>
<h2>DEPARTAMENTO DE INVESTIGAÇÃO</h2>
<p>Verificando permissões...</p>
</div>

<!-- BOOT -->
<div id="boot">
<h3>Sistema de Investigação</h3>
<p>Carregando dados...</p>
<div class="bar"><div class="bar-fill"></div></div>
</div>

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>
<div class="right-icons">
<span class="battery">🔋</span>
<span>📶</span>
</div>
</div>

<!-- LOCK -->
<div id="lock" class="lock">
<h3>Senha</h3>
<div id="dots">○ ○ ○ ○</div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="reset()">←</button>
<button onclick="press(0)">0</button>
</div>
</div>

<!-- HOME -->
<div id="home">
<div onclick="clickSound(); openFake()">💬</div>
<div onclick="clickSound(); openFake()">📸</div>
<div onclick="clickSound(); openFake()">📞</div>
<div onclick="clickSound(); openFake()">📝</div>
<div onclick="clickSound(); openFake()">🎮</div>
<div onclick="clickSound(); openFake()">🧮</div>
<div onclick="clickSound(); openFake()">📁</div>
<div onclick="clickSound(); openFake()">⚙️</div>
</div>

<!-- BLOCK -->
<div id="block" class="block-screen">
<div class="block-card">
<div class="close-x" onclick="closeFake(); clickSound()">✕</div>
<h3>Aplicativo em análise</h3>
<p>Acesso bloqueado.</p>
</div>
</div>

<!-- DOCK -->
<div class="dock-bar">
<div onclick="goLock()">⬅</div>
<div onclick="goHome()">⬤</div>
<div>➤</div>
</div>

<div class="homebar"></div>

</div>

<script>

window.onload = () => {
setTimeout(()=>{
document.getElementById("intro").style.display="none";
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("lock").style.display="flex";
},2000);
},2500);
};

let senha="1234";
let entrada="";

function press(n){
clickSound();
entrada+=n;
update();
if(entrada.length===4){
setTimeout(()=>{
if(entrada===senha) goHome();
else shake();
reset();
},200);
}
}

function update(){
let d="";
for(let i=0;i<4;i++){
d+=i<entrada.length?"● ":"○ ";
}
document.getElementById("dots").innerHTML=d;
}

function reset(){entrada="";update();}

function goHome(){
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="grid";
}

function goLock(){
document.getElementById("home").style.display="none";
document.getElementById("lock").style.display="flex";
reset();
}

function openFake(){
document.getElementById("block").style.display="flex";
}

function closeFake(){
document.getElementById("block").style.display="none";
}

function shake(){
let l=document.getElementById("lock");
l.style.transform="translateX(-5px)";
setTimeout(()=>l.style.transform="translateX(5px)",80);
setTimeout(()=>l.style.transform="translateX(0)",160);
}

function clickSound(){
let ctx=new AudioContext();
let osc=ctx.createOscillator();
let gain=ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value=600;
gain.gain.value=0.05;
osc.start();
osc.stop(ctx.currentTime+0.08);
}

</script>

</body>
</html>
