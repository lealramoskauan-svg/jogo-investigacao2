<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.screen{display:none;}
.active{display:block}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
border:4px solid rgba(255,255,255,0.15);

background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* NOTCH */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:25px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
display:flex;
justify-content:center;
align-items:center;
}

.camera{
width:8px;
height:8px;
background:#222;
border-radius:50%;
border:2px solid #333;
}

/* STATUS BAR (SEM ANTENA) */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
}

/* BATERIA */
.battery{
display:inline-block;
transform:rotate(90deg);
filter:brightness(0) invert(1);
margin-left:4px;
}

/* LOCK */
.lock{
text-align:center;
padding-top:140px;
height:100%;
}

#dots{
font-size:25px;
letter-spacing:8px;
margin:20px;
}

/* KEYBOARD */
.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.keypad button{
height:60px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.3);
color:white;
font-size:18px;
}

/* HOME */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
}

/* APP BLOQUEADO */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.block-screen h2{
color:#4fc3ff;
margin-bottom:10px;
}

.block-screen p{
font-size:14px;
opacity:0.8;
}

/* DOCK */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
}

</style>
</head>

<body>

<div class="phone">

<!-- NOTCH -->
<div class="notch">
<div class="camera"></div>
</div>

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>
<span>📶 <span class="battery">🔋</span></span>
</div>

<!-- HOME -->
<div class="apps">
<div onclick="abrirFake()">🎮</div>
<div onclick="abrirFake()">🧮</div>
<div onclick="abrirFake()">📁</div>
<div onclick="abrirFake()">🎧</div>
<div onclick="abrirFake()">🗂️</div>
<div onclick="abrirFake()">📷</div>
<div onclick="abrirFake()">🧠</div>
<div onclick="abrirFake()">⚙️</div>
</div>

<!-- APP BLOQUEADO -->
<div id="block" class="block-screen">
<h2>Aplicativo em análise</h2>
<p>
Este aplicativo foi identificado como parte do sistema de segurança do dispositivo apreendido.<br><br>
Acesso temporariamente restrito pela equipe de investigação.
</p>
</div>

<!-- DOCK -->
<div class="dock-bar">
<div>⬅</div>
<div onclick="fecharFake()">⬤</div>
<div>➤</div>
</div>

</div>

<script>

function abrirFake(){
document.getElementById("block").style.display="flex";
}

function fecharFake(){
document.getElementById("block").style.display="none";
}

</script>

</body>
</html>
