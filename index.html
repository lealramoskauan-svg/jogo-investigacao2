<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<!-- FONT MODERNA -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* SCREEN SYSTEM */
.screen{display:none;}
.active{display:block}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
border:4px solid rgba(255,255,255,0.15);

/* WALLPAPER AZUL */
background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* NOTCH + CAMERA (VOLTOU) */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:25px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
display:flex;
justify-content:center;
align-items:center;
}

.camera{
width:8px;
height:8px;
background:#222;
border-radius:50%;
border:2px solid #333;
}

/* STATUS BAR (MODERNA + BATERIA CORRETA) */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
font-weight:500;
}

/* bateria branca deitada */
.battery{
display:inline-block;
transform:rotate(90deg);
filter:brightness(0) invert(1);
margin-left:6px;
}

/* LOCK */
.lock{
text-align:center;
padding-top:140px;
height:100%;
transition:0.3s;
}

#dots{
font-size:25px;
letter-spacing:8px;
margin:20px;
}

/* KEYBOARD */
.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.keypad button{
height:60px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

.keypad button:active{
transform:scale(0.95);
background:rgba(255,255,255,0.4);
}

/* HOME APPS (ANTIGOS + NOVOS) */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
}

.apps div{
cursor:pointer;
transition:0.2s;
}

.apps div:active{
transform:scale(0.9);
}

/* DOCK (BOTÕES VOLTARAM) */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
}

/* HOME BAR */
.homebar{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

/* ANIMAÇÃO DOTS */
@keyframes pop {
0% { transform:scale(1); opacity:0.6; }
50% { transform:scale(1.4); opacity:1; }
100% { transform:scale(1); opacity:0.8; }
}

.dot-pop{
display:inline-block;
animation:pop 0.2s ease;
}

/* SHAKE */
@keyframes shake {
0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-4px);}
100%{transform:translateX(0);}
}

.shake{
animation:shake 0.4s ease;
}

/* 🔥 APP BLOCK (CANVA STYLE) */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(10px);
}

.block-card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:20px;
width:80%;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fadeIn 0.3s ease;
}

.block-card h2{
margin:10px 0;
font-size:18px;
}

.block-card p{
font-size:13px;
opacity:0.8;
line-height:1.4;
}

.icon{
font-size:28px;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<div class="phone">

<!-- NOTCH -->
<div class="notch">
<div class="camera"></div>
</div>

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>
<span>📶 <span class="battery">🔋</span></span>
</div>

<!-- LOCK -->
<div id="lock" class="lock">
<h3>Digite a senha</h3>
<div id="dots">○ ○ ○ ○</div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="reset()">←</button>
<button onclick="press(0)">0</button>
</div>
</div>

<!-- HOME APPS (ORIGINAIS + FAKES) -->
<div id="home" class="apps">
<div>💬</div>
<div>📸</div>
<div>📞</div>
<div>📝</div>
<div onclick="openFake()">🎮</div>
<div onclick="openFake()">🧮</div>
<div onclick="openFake()">📁</div>
<div onclick="openFake()">⚙️</div>
</div>

<!-- APP BLOCK BONITO -->
<div id="block" class="block-screen">
<div class="block-card">
<div class="icon">⚠️</div>
<h2>Aplicativo em análise</h2>
<p>
Este aplicativo foi identificado no dispositivo apreendido e está temporariamente bloqueado pela equipe de investigação.
</p>
</div>
</div>

<!-- DOCK -->
<div class="dock-bar">
<div onclick="voltar()">⬅</div>
<div onclick="unlockFake()">⬤</div>
<div>➤</div>
</div>

<div class="homebar"></div>

</div>

<script>

let senha="1234";
let entrada="";

function press(n){

if(entrada.length < 4){
entrada += n;
update(true);
}

if(entrada.length === 4){
setTimeout(()=>{
if(entrada === senha){
unlock();
}else{
wrong();
}
},150);
}
}

function update(anim=false){
let d="";
for(let i=0;i<4;i++){
let v=i<entrada.length?"●":"○";
d+=v+" ";
}
document.getElementById("dots").innerHTML=d;
}

function reset(){
entrada="";
update();
}

function unlock(){
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="grid";
}

function wrong(){
let lock=document.getElementById("lock");
lock.classList.add("shake");
setTimeout(()=>{lock.classList.remove("shake"); reset();},400);
}

function openFake(){
document.getElementById("block").style.display="flex";
}

function unlockFake(){
document.getElementById("block").style.display="none";
}

function voltar(){
document.getElementById("lock").style.display="block";
document.getElementById("home").style.display="none";
reset();
}

</script>

</body>
</html>
