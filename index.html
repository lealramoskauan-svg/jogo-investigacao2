<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
border:4px solid rgba(255,255,255,0.15);
background:#050b1a;
}

/* BOOT */
#boot{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:100;
}

/* CAMERA */
.front-camera{
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
width:10px;
height:10px;
border-radius:50%;
background:#1c1c1c;
border:2px solid #444;
z-index:10;
}

/* STATUS BAR */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
z-index:5;
}

/* 🔧 WIFI + BATERIA AJUSTADOS */
.right-icons{
display:flex;
align-items:center;
gap:10px;
margin-left:40px; /* 👈 empurra para longe da câmera */
}

.battery{
transform:rotate(90deg);
font-size:16px;
}

/* LOCK */
.lock{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#dots{
font-size:24px;
letter-spacing:8px;
margin:20px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.keypad button{
height:60px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:18px;
cursor:pointer;
}

/* HOME */
.apps{
display:none;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
}

/* BLOQUEIO */
#lockBlock{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
z-index:200;
}

.block-card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
text-align:center;
position:relative;
}

/* ❌ X RESTAURADO */
.close-x{
position:absolute;
top:10px;
right:10px;
width:24px;
height:24px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
color:#ffcc00;
font-weight:bold;
background:rgba(255, 204, 0, 0.15);
}

.close-x:hover{
background:rgba(255, 204, 0, 0.3);
}

</style>
</head>

<body>

<div class="phone">

<!-- CAMERA -->
<div class="front-camera"></div>

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>

<div class="right-icons">
<span>📶</span>
<span class="battery">🔋</span>
</div>

</div>

<!-- BOOT -->
<div id="boot">
<div style="font-size:45px;">🚔</div>
<h2>Sistema de Investigação</h2>
<p>Carregando...</p>
</div>

<!-- LOCK BLOCK -->
<div id="lockBlock">
<div class="block-card">
<div class="close-x" onclick="closeBlock()">✕</div>
<h3>⛔ Bloqueado</h3>
<p>Aguarde 10 segundos</p>
</div>
</div>

<!-- LOCK -->
<div id="lock" class="lock">
<h3>Digite a senha</h3>
<div id="dots">○ ○ ○ ○</div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="reset()">←</button>
<button onclick="press(0)">0</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="apps">
<div>💬</div>
<div>📸</div>
<div>📞</div>
<div>📝</div>
<div>🎮</div>
<div>🧮</div>
<div>📁</div>
<div>⚙️</div>
</div>

</div>

<script>

let senha="1234";
let entrada="";
let travado=false;

/* BOOT */
window.onload = () => {
setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("lock").style.display="flex";
},2000);
};

/* SENHA */
function press(n){
if(travado) return;

if(entrada.length<4){
entrada+=n;
update();
}

if(entrada.length===4){
setTimeout(()=>{
if(entrada===senha){
goHome();
}else{
wrong();
}
reset();
},200);
}
}

function update(){
let d="";
for(let i=0;i<4;i++){
d += i<entrada.length ? "● " : "○ ";
}
document.getElementById("dots").innerHTML=d;
}

function reset(){
entrada="";
update();
}

function goHome(){
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="grid";
}

function wrong(){
travado=true;
document.getElementById("lockBlock").style.display="flex";

setTimeout(()=>{
travado=false;
document.getElementById("lockBlock").style.display="none";
},10000);
}

function closeBlock(){
document.getElementById("lockBlock").style.display="none";
travado=false;
}

</script>

</body>
</html>
