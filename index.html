<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
border:4px solid rgba(255,255,255,0.15);

background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* NOTCH */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:150px;
height:28px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
display:flex;
justify-content:space-around;
align-items:center;
padding:0 10px;
z-index:10;
}

.camera{
width:8px;
height:8px;
border-radius:50%;
background:#2b2b2b;
border:1px solid #555;
}

/* STATUS */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
}

.battery{
display:inline-block;
transform:rotate(90deg);
margin-left:6px;
}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
}

.apps div{
cursor:pointer;
}

/* BLOCK SCREEN */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:20;
}

.block-card{
position:relative;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:20px;
width:80%;
text-align:center;
}

/* ❌ X AMARELO FIXO */
.close-x{
position:absolute;
top:10px;
right:10px;
width:26px;
height:26px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
background:rgba(255, 204, 0, 0.15);
backdrop-filter:blur(8px);
font-size:14px;
transition:0.2s;
color:#ffcc00;
font-weight:700;
}

.close-x:hover{
background:rgba(255, 204, 0, 0.25);
color:#ffcc00;
transform:scale(1.1);
box-shadow:0 0 10px rgba(255, 204, 0, 0.5);
}

/* DOCK */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
z-index:10;
cursor:pointer;
}

.homebar{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="phone">

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>
<span>📶 <span class="battery">🔋</span></span>
</div>

<!-- APPS -->
<div id="home" class="apps">
<div onclick="clickSound();">💬</div>
<div onclick="clickSound();">📸</div>
<div onclick="clickSound();">📞</div>
<div onclick="clickSound();">📝</div>
<div onclick="openFake()">🎮</div>
<div onclick="openFake()">🧮</div>
<div onclick="openFake()">📁</div>
<div onclick="openFake()">⚙️</div>
</div>

<!-- APP BLOQUEADO -->
<div id="block" class="block-screen">
<div class="block-card">

<div class="close-x" onclick="closeFake(); clickSound();">✕</div>

<h2>⚠️ Aplicativo em análise</h2>
<p>
Este aplicativo foi identificado no dispositivo apreendido.<br>
Acesso temporariamente bloqueado pela equipe de investigação.
</p>

</div>
</div>

<!-- DOCK -->
<div class="dock-bar">
<div onclick="clickSound()">⬅</div>
<div onclick="clickSound()">⬤</div>
<div onclick="clickSound()">➤</div>
</div>

<div class="homebar"></div>

</div>

<script>

/* 🔊 SOM SIMPLES (sem arquivo externo) */
function clickSound(){
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
let gain = ctx.createGain();

osc.type = "sine";
osc.frequency.value = 600;
gain.gain.value = 0.05;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
osc.stop(ctx.currentTime + 0.08);
}

/* abrir app fake */
function openFake(){
clickSound();
document.getElementById("block").style.display="flex";
}

/* fechar app */
function closeFake(){
document.getElementById("block").style.display="none";
}

</script>

</body>
</html>
