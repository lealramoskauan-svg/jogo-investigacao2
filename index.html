<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.4s;
}

/* 🔴 OFF = fundo branco */
body.off{
background:#ffffff;
}

/* ⚡ ON = fundo escuro */
body.on{
background:#0f1115;
}

/* 🔌 BOTÃO EXTERNO */
.power-btn{
position:absolute;
top:20px;
right:20px;
padding:12px 14px;
border-radius:14px;
cursor:pointer;
backdrop-filter:blur(10px);
border:1px solid rgba(0,0,0,0.2);
background:rgba(255,255,255,0.7);
color:black;
font-size:14px;
}

body.on .power-btn{
background:rgba(0,0,0,0.4);
color:white;
border:1px solid rgba(255,255,255,0.2);
}

/* 📱 CARCAÇA SEMPRE VISÍVEL */
.phone{
width:320px;
height:640px;
border-radius:40px;
position:relative;
border:4px solid rgba(255,255,255,0.15);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
overflow:hidden;
background:black;
}

/* wallpaper só quando ligado */
body.on .phone{
background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* 🔝 NOTCH + CÂMERA */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:25px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
display:flex;
justify-content:center;
align-items:center;
}

.camera{
width:9px;
height:9px;
background:#222;
border-radius:50%;
border:2px solid #444;
}

/* STATUS */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
color:white;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
}

/* 🔋 bateria visível */
.battery{
display:inline-block;
transform:rotate(90deg);
color:white;
margin-left:6px;
}

/* 📵 CONTEÚDO DO CELULAR */
.lock, .apps{
display:none;
color:white;
text-align:center;
}

/* LOCK */
.lock{
padding-top:150px;
}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
margin-top:70px;
font-size:28px;
}

/* DOCK FIXA */
.dock{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(0,0,0,0.75);
color:white;
backdrop-filter:blur(10px);
font-size:20px;
}

/* HOME BAR */
.homebar{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

</style>
</head>

<body class="off">

<!-- BOTÃO EXTERNO -->
<div class="power-btn" onclick="togglePower()">
⚡ Power
</div>

<!-- CELULAR -->
<div class="phone">

<div class="notch">
<div class="camera"></div>
</div>

<div class="status">
<span>🔔 9:41</span>
<span>📶 <span class="battery">🔋</span></span>
</div>

<!-- LOCK -->
<div id="lock" class="lock">
<h3>Celular desligado</h3>
</div>

<!-- APPS -->
<div id="apps" class="apps">
<div>💬</div>
<div>📸</div>
<div>📞</div>
<div>📝</div>
<div>🎮</div>
<div>🧮</div>
<div>📁</div>
<div>⚙️</div>
</div>

<!-- DOCK -->
<div class="dock">
<div>⬅</div>
<div>⬤</div>
<div>➤</div>
</div>

<div class="homebar"></div>

</div>

<script>

let ligado = false;

function render(){

if(ligado){
document.body.className = "on";
document.getElementById("lock").style.display="block";
document.getElementById("apps").style.display="grid";
}else{
document.body.className = "off";
document.getElementById("lock").style.display="block";
document.getElementById("apps").style.display="none";
}
}

function togglePower(){
ligado = !ligado;
render();
}

/* inicia desligado corretamente */
window.onload = () => {
ligado = false;
render();
};

</script>

</body>
</html>
