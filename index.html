<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* TELAS */
.screen{display:none;}
.active{display:block}

/* MENU */
.menu{text-align:center;}
.btn{
margin:10px;
padding:15px;
background:#222;
border-radius:10px;
cursor:pointer;
}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
background:url('https://images.unsplash.com/photo-1603791440384-56cd371ee9a7');
background-size:cover;
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* NOTCH */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:25px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
z-index:10;
display:flex;
justify-content:center;
align-items:center;
}

.camera{
width:8px;
height:8px;
background:#222;
border-radius:50%;
border:2px solid #333;
}

/* STATUS BAR */
.status{
position:absolute;
top:0;
width:100%;
padding:5px 12px;
font-size:12px;
display:flex;
justify-content:space-between;
color:white;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
}

/* LOCK SCREEN */
.lock{
text-align:center;
padding-top:140px;
backdrop-filter:blur(10px);
height:100%;
transition:0.3s;
}

#dots{
font-size:25px;
letter-spacing:8px;
margin:20px;
}

/* KEYBOARD */
.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.keypad button{
height:60px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.3);
color:white;
font-size:18px;
cursor:pointer;
}

/* HOME */
.home{
display:none;
padding:20px;
}

.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:35px;
}

/* BOTTOM NAV */
.bottom-buttons{
position:absolute;
bottom:25px;
width:100%;
display:flex;
justify-content:space-around;
font-size:22px;
color:white;
opacity:0.9;
}

.bottom-buttons div{
cursor:pointer;
}

.homebar{
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

/* SHAKING */
@keyframes shake {
0% { transform: translateX(0); }
20% { transform: translateX(-8px); }
40% { transform: translateX(8px); }
60% { transform: translateX(-6px); }
80% { transform: translateX(6px); }
100% { transform: translateX(0); }
}

.shake {
animation: shake 0.4s ease;
}

/* DOT ANIMATION */
@keyframes pop {
0% { transform: scale(1); opacity:0.6; }
50% { transform: scale(1.4); opacity:1; }
100% { transform: scale(1); opacity:0.8; }
}

.dot-pop{
display:inline-block;
animation: pop 0.2s ease;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active menu">
<h2>Selecionar Celular</h2>
<div class="btn" onclick="abrirCel()">Celular 1</div>
<div class="btn" onclick="abrirCel()">Celular 2</div>
<div class="btn" onclick="abrirCel()">Celular 3</div>
</div>

<!-- CELULAR -->
<div id="celular" class="screen">

<div class="phone">

<div class="notch">
<div class="camera"></div>
</div>

<div class="status">
<span>🔔 9:41</span>
<span>📶 📡 🔋</span>
</div>

<!-- LOCK -->
<div id="lock" class="lock">
<h3>Digite a senha</h3>
<div id="dots">○ ○ ○ ○</div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="reset()">←</button>
<button onclick="press(0)">0</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="home">
<div class="apps">
<div>💬</div>
<div>📸</div>
<div>📞</div>
<div>📝</div>
</div>
</div>

<!-- BOTÕES INFERIORES -->
<div class="bottom-buttons">
<div onclick="voltar()">⬅</div>
<div onclick="unlockFake()">⬤</div>
<div>➤</div>
</div>

<div class="homebar"></div>

</div>
</div>

<script>

let senha = "1234";
let entrada = "";

/* ABRIR CELULAR */
function abrirCel(){
document.getElementById("menu").classList.remove("active");
document.getElementById("celular").classList.add("active");
}

/* VOLTAR MENU */
function voltar(){
document.getElementById("celular").classList.remove("active");
document.getElementById("menu").classList.add("active");

reset();
document.getElementById("home").style.display="none";
document.getElementById("lock").style.display="block";
}

/* DIGITAR SENHA */
function press(n){

if(entrada.length < 4){
entrada += n;
update(true);
}

if(entrada.length === 4){
setTimeout(() => {
if(entrada === senha){
unlock();
}else{
wrong();
}
},150);
}
}

/* UPDATE DOS DOTS */
function update(animate=false){
let d = "";

for(let i=0;i<4;i++){
let filled = i < entrada.length ? "●" : "○";

if(animate && i === entrada.length - 1){
d += `<span class="dot-pop">${filled}</span> `;
}else{
d += filled + " ";
}
}

document.getElementById("dots").innerHTML = d;
}

/* RESET */
function reset(){
entrada="";
update();
}

/* DESBLOQUEIO */
function unlock(){
document.getElementById("lock").style.opacity="0";
document.getElementById("lock").style.transform="scale(1.1)";

setTimeout(()=>{
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="block";
},300);
}

/* ERRO SENHA */
function wrong(){
let lock = document.getElementById("lock");
lock.classList.add("shake");

setTimeout(()=>{
lock.classList.remove("shake");
reset();
},400);
}

/* BOTÃO HOME FAKE */
function unlockFake(){
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="block";
}

</script>

</body>
</html>
