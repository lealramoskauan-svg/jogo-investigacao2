<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
border:4px solid rgba(255,255,255,0.15);
box-shadow:0 20px 60px rgba(0,0,0,0.7);
background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* CAMERA */
.front-camera{
position:absolute;
top:8px;
left:50%;
transform:translateX(-50%);
width:10px;
height:10px;
background:#1c1c1c;
border-radius:50%;
border:2px solid #444;
z-index:20;
}

/* STATUS */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
z-index:10;
}

/* SISTEMA STATUS (NOVO) */
.system-status{
position:absolute;
top:28px;
left:14px;
font-size:10px;
opacity:0.6;
}

/* BATERIA DINÂMICA */
.right-icons{
display:flex;
align-items:center;
gap:6px;
}

.battery{
transform:rotate(90deg);
font-size:16px;
transition:0.3s;
}

/* LOCK ANIMAÇÃO */
.lock{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:0.4s ease;
opacity:1;
transform:scale(1);
}

/* HOME */
.apps{
display:none;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
transition:0.4s ease;
}

/* ANIMAÇÃO GLOBAL */
.fade-out{
opacity:0;
transform:scale(1.05);
}

/* BLOQUEIO APP */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:50;
}

.block-card{
position:relative;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:20px;
width:80%;
text-align:center;
}

/* DOCK */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
cursor:pointer;
}

/* BLUR DINÂMICO */
.blur{
filter:blur(8px);
transition:0.3s;
}

/* SHAKE */
@keyframes shake {
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-3px);}
100%{transform:translateX(0);}
}
.shake{animation:shake 0.3s;}

</style>
</head>

<body>

<div class="phone">

<div class="front-camera"></div>

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>

<div class="right-icons">
<span id="battery" class="battery">🔋</span>
<span>📶</span>
</div>
</div>

<div class="system-status">Modo investigação ativo</div>

<!-- LOCK -->
<div id="lock" class="lock">
<h3>Digite a senha</h3>
<div id="dots">○ ○ ○ ○</div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="reset()">←</button>
<button onclick="press(0)">0</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="apps">
<div onclick="clickSound()">💬</div>
<div onclick="clickSound()">📸</div>
<div onclick="clickSound()">📞</div>
<div onclick="clickSound()">📝</div>
<div onclick="openFake()">🎮</div>
<div onclick="openFake()">🧮</div>
<div onclick="openFake()">📁</div>
<div onclick="openFake()">⚙️</div>
</div>

<!-- APP BLOQUEADO -->
<div id="block" class="block-screen">
<div class="block-card">
<h2>⚠️ Aplicativo em análise</h2>
<p>Bloqueado pela equipe de investigação.</p>
</div>
</div>

<!-- DOCK -->
<div class="dock-bar">
<div onclick="goLock()">⬅</div>
<div onclick="goHome()">⬤</div>
<div>➤</div>
</div>

</div>

<script>

let senha="1234";
let entrada="";
let erros=0;

/* SENHA */
function press(n){
clickSound();

if(entrada.length<4){
entrada+=n;
update();
}

if(entrada.length===4){
setTimeout(()=>{
if(entrada===senha){
goHome();
erros=0;
}else{
erros++;
shake();
reset();
checkLock();
}
},150);
}
}

function update(){
let d="";
for(let i=0;i<4;i++){
d += i<entrada.length ? "● " : "○ ";
}
document.getElementById("dots").innerHTML=d;
}

function reset(){
entrada="";
update();
}

/* BLOQUEIO INTELIGENTE */
function checkLock(){
if(erros>=3){
document.getElementById("lock").innerHTML="<h3>Dispositivo bloqueado</h3>";
}
}

/* TELA */
function goHome(){
switchScreen("home");
}

function goLock(){
switchScreen("lock");
}

/* TRANSIÇÃO SUAVE */
function switchScreen(screen){
document.getElementById("lock").classList.add("fade-out");
document.getElementById("home").classList.add("fade-out");

setTimeout(()=>{
if(screen==="home"){
document.getElementById("lock").style.display="none";
document.getElementById("home").style.display="grid";
}else{
document.getElementById("home").style.display="none";
document.getElementById("lock").style.display="flex";
}
document.getElementById("lock").classList.remove("fade-out");
document.getElementById("home").classList.remove("fade-out");
},200);
}

/* APP */
function openFake(){
document.getElementById("home").classList.add("blur");
document.getElementById("block").style.display="flex";
}

function clickSound(){
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
let gain = ctx.createGain();

osc.type="sine";
osc.frequency.value=600;
gain.gain.value=0.05;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();
osc.stop(ctx.currentTime+0.08);
}

/* BLUR REMOVE */
document.getElementById("block").addEventListener("click",()=>{
document.getElementById("block").style.display="none";
document.getElementById("home").classList.remove("blur");
});

/* 🔋 BATERIA DINÂMICA */
function updateBattery(){
let b=document.getElementById("battery");

let level=100; // simulado

if(level>50){
b.style.color="white";
}else if(level>20){
b.style.color="yellow";
}else{
b.style.color="red";
}
}
updateBattery();

/* SHAKE */
function shake(){
document.getElementById("lock").classList.add("shake");
setTimeout(()=>{
document.getElementById("lock").classList.remove("shake");
},300);
}

</script>

</body>
</html>
