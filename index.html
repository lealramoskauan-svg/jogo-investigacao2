<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
border:4px solid rgba(255,255,255,0.15);
box-shadow:0 20px 60px rgba(0,0,0,0.7);

background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* NOTCH */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:25px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.camera{
width:9px;
height:9px;
background:#1a1a1a;
border-radius:50%;
border:2px solid #444;
}

/* STATUS */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
}

.right-icons{
display:flex;
gap:6px;
margin-right:10px;
}

.battery{
transform:rotate(90deg);
color:white;
font-size:16px;
}

/* APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
}

/* BLOCK */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.block-card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:20px;
width:80%;
text-align:center;
}

/* DOCK NOVA (2 BOTÕES) */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
font-size:24px;
z-index:999;
}

/* HOME BAR */
.homebar{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="phone">

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>
<div class="right-icons">
<span>📶</span>
<span class="battery">🔋</span>
</div>
</div>

<!-- APPS -->
<div class="apps">
<div>💬</div>
<div>📸</div>
<div>📞</div>
<div>📝</div>
<div onclick="openFake()">🎮</div>
<div onclick="openFake()">🧮</div>
<div onclick="openFake()">📁</div>
<div onclick="openFake()">⚙️</div>
</div>

<!-- BLOCK -->
<div id="block" class="block-screen">
<div class="block-card">
<h2>⚠️ Aplicativo em análise</h2>
<p>Este aplicativo foi bloqueado pela equipe de investigação.</p>
</div>
</div>

<!-- 🔥 DOCK COM 2 BOTÕES -->
<div class="dock-bar">
<div onclick="goLock()">⬅</div>
<div onclick="goHome()">⬤</div>
</div>

<div class="homebar"></div>

</div>

<script>

/* abre app bloqueado */
function openFake(){
document.getElementById("block").style.display="flex";
}

/* fecha app */
function unlockFake(){
document.getElementById("block").style.display="none";
}

/* ⬅ BLOQUEIO */
function goLock(){
document.getElementById("block").style.display="none";
document.querySelector(".apps").style.display="none";
}

/* ⬤ HOME */
function goHome(){
document.getElementById("block").style.display="none";
document.querySelector(".apps").style.display="grid";
}

</script>

</body>
</html>
