<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investigação</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* TELAS */
.screen{display:none;}
.active{display:block}

/* CELULAR */
.phone{
width:320px;
height:640px;
border-radius:40px;
overflow:hidden;
position:relative;
border:4px solid rgba(255,255,255,0.15);
box-shadow:0 20px 60px rgba(0,0,0,0.7);

background:
radial-gradient(circle at 30% 30%, rgba(0,180,255,0.35), transparent 45%),
radial-gradient(circle at 70% 70%, rgba(0,80,255,0.25), transparent 50%),
#050b1a;
}

/* NOTCH */
.notch{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:140px;
height:25px;
background:#000;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.camera{
width:9px;
height:9px;
background:#1a1a1a;
border-radius:50%;
border:2px solid #444;
}

/* STATUS BAR */
.status{
position:absolute;
top:0;
width:100%;
padding:10px 14px;
font-size:14px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
}

/* 🔋 BATERIA CORRIGIDA (MAIS PRA ESQUERDA E VISÍVEL) */
.right-icons{
display:flex;
align-items:center;
gap:6px;
margin-right:18px; /* 👈 puxado pra esquerda */
}

.battery{
display:inline-block;
transform:rotate(90deg);
color:white;
font-size:16px;
}

/* LOCK */
.lock{
text-align:center;
padding-top:140px;
height:100%;
}

#dots{
font-size:25px;
letter-spacing:8px;
margin:20px;
}

/* KEYBOARD */
.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.keypad button{
height:60px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:18px;
}

/* HOME APPS */
.apps{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-top:80px;
text-align:center;
font-size:30px;
padding:20px;
}

/* DOCK FIXA */
.dock-bar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
z-index:999;
}

/* HOME BAR */
.homebar{
position:absolute;
bottom:6px;
left:50%;
transform:translateX(-50%);
width:120px;
height:5px;
background:white;
border-radius:10px;
opacity:0.7;
}

/* BLOCK */
.block-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:20;
}

.block-card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
padding:20px;
width:80%;
text-align:center;
}

</style>
</head>

<body>

<div class="phone">

<!-- STATUS -->
<div class="status">
<span>🔔 9:41</span>

<div class="right-icons">
<span>📶</span>
<span class="battery">🔋</span>
</div>
</div>

<!-- HOME APPS -->
<div class="apps">
<div>💬</div>
<div>📸</div>
<div>📞</div>
<div>📝</div>
<div onclick="openFake()">🎮</div>
<div onclick="openFake()">🧮</div>
<div onclick="openFake()">📁</div>
<div onclick="openFake()">⚙️</div>
</div>

<!-- BLOCK -->
<div id="block" class="block-screen">
<div class="block-card">
<h2>⚠️ Aplicativo em análise</h2>
<p>Este aplicativo foi bloqueado pela equipe de investigação.</p>
</div>
</div>

<!-- DOCK -->
<div class="dock-bar">
<div onclick="turnOff()">⬅</div>
<div onclick="unlockFake()">⬤</div>
<div onclick="goLock()">➤</div>
</div>

<div class="homebar"></div>

</div>

<script>

/* abre app bloqueado */
function openFake(){
document.getElementById("block").style.display="flex";
}

/* fecha app */
function unlockFake(){
document.getElementById("block").style.display="none";
}

/* ➡ volta pra tela de bloqueio */
function goLock(){
document.getElementById("block").style.display="none";
alert("Voltando para tela de bloqueio...");
}

/* ⬅ desliga (volta menu) */
function turnOff(){
alert("Celular desligado");
location.reload(); // simula desligar
}

</script>

</body>
</html>
